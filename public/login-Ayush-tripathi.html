<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login - Complaint Severity Dashboard</title>
        <link rel="stylesheet" href="css/Ragister-page.css">
    </head>
    <body>
        <div class="sign-in-box">
            <div class="home-link"><a href="home_page.html">&#x2190</a></div>
            <h2>Login</h2>
            <p class="subtitle">Sign in to your account</p>
            <form id="login-form">
                <p id="alert" class="alert"></p>
                <div class="form-group">
                    <input type="email" id="login-email" name="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <input type="password" id="login-password" name="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="submit-btn">Login</button>
                <div class="login-link">
                    Don't have an account? <a href="sign_in-Ayush-tripathi.html">Register here</a>
                </div>
            </form>
        </div>
        <script src="js/app.js" defer></script>
    </body>
</html>
