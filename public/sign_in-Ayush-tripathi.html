<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Registration - Complaint Severity Dashboard</title>
        <link rel="stylesheet" href="css/Ragister-page.css">
    </head>
    <body>
        <div class="sign-in-box">
            <div class="home-link"><a class="Back" href="home_page.html"><::</a></div>
            <h2>Registration</h2>
            <p class="subtitle">Create your account to get started</p>
            <form id="register-form">
                <p id="alert" class="alert"></p>
                <div class="form-group">
                    <input type="text" id="register-name" name="name" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <input type="email" id="register-email" name="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <input type="tel" id="register-phone" name="phone" placeholder="Enter your contact number" required>
                </div>
                <div class="form-group">
                    <input type="password" id="register-password" name="password" placeholder="Create a strong password" required>
                </div>
                <div class="form-group">
                    <input type="password" id="register-confirm-password" name="confirm-password" placeholder="Re-enter your password" required>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="terms" name="terms" required>
                    <label for="terms">I agree to the <a href="terms.html">Terms and Conditions</a></label>
                </div>
                <button type="submit" class="submit-btn">Register Now</button>
                <div class="login-link">
                    Already have an account? <a href="login-Ayush-tripathi.html">Login here</a>
                </div>
            </form>
        </div>
        <script src="js/app.js" defer></script>
    </body>
</html>
